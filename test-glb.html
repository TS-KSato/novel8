<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB技術検証 — rein.glb（ゲーム本体とは無関係の検証専用ページ）</title>
<style>
  body { margin: 0; background: #cfe0f4; font-family: system-ui, sans-serif; }
  #view { width: 100vw; height: 62vh; display: block; }
  #panel { padding: 10px 14px; }
  button { min-height: 40px; margin: 4px 6px 4px 0; padding: 6px 14px; font-size: 14px; }
  pre { background: #fff; border: 1px solid #ccc; padding: 10px; font-size: 11px;
        overflow: auto; max-height: 32vh; white-space: pre-wrap; }
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="panel">
  <button id="btn-tpose">Tポーズ（元データ）</button>
  <button id="btn-pose">ポーズ補正（腕を下げる）</button>
  <button id="btn-three">3体表示（性能確認）</button>
  <button id="btn-wire">ワイヤーフレーム</button>
  <span id="fps"></span>
  <pre id="log">読み込み中…</pre>
</div>
<script src="vendor/three.min.js"></script>
<script src="vendor/GLTFLoader.js"></script>
<script>
(() => {
  'use strict';
  const logEl = document.getElementById('log');
  const log = s => { logEl.textContent += '\n' + s; };
  logEl.textContent = 'rein.glb 検証ページ（ゲーム本体からはリンクされていません）';

  const canvas = document.getElementById('view');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xcfe0f4);
  const camera = new THREE.PerspectiveCamera(40, 2, 0.05, 50);
  camera.position.set(0, 0.9, 2.6);
  camera.lookAt(0, 0.55, 0);
  scene.add(new THREE.HemisphereLight(0xf2f7fc, 0xe6d6b8, 1.0));
  const sun = new THREE.DirectionalLight(0xfff2dd, 0.6);
  sun.position.set(3, 5, 4);
  scene.add(sun);
  const ground = new THREE.Mesh(
    new THREE.CylinderGeometry(1.4, 1.4, 0.06, 32),
    new THREE.MeshLambertMaterial({ color: 0x93c161 }));
  ground.position.y = -0.03;
  scene.add(ground);

  function resize() {
    const w = innerWidth, h = innerHeight * 0.62;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  addEventListener('resize', resize);
  resize();

  const group = new THREE.Group();
  scene.add(group);
  let bones = {};      // 1体目のボーン参照
  let allModels = [];  // {root, bones} の配列
  let posed = false;

  /* mixamoリグの肩・腕ボーンを名前で拾う */
  function collectBones(root) {
    const map = {};
    root.traverse(o => {
      if (o.isBone) {
        const n = o.name.toLowerCase();
        if (n.includes('leftarm') && !n.includes('fore')) map.lArm = o;
        if (n.includes('rightarm') && !n.includes('fore')) map.rArm = o;
        if (n.includes('leftforearm')) map.lFore = o;
        if (n.includes('rightforearm')) map.rFore = o;
        if (n.includes('leftshoulder')) map.lSh = o;
        if (n.includes('rightshoulder')) map.rSh = o;
      }
    });
    return map;
  }

  /* 立ちポーズ補正: 上腕を体側へ下ろし、前腕をわずかに曲げる */
  function applyPose(b, on) {
    if (!b.lArm || !b.rArm) return false;
    const arm = on ? THREE.MathUtils.degToRad(58) : 0;
    const fore = on ? THREE.MathUtils.degToRad(8) : 0;
    // Tポーズ（腕がZ軸沿い）でも自然に下がるよう、上腕をX軸回りに回す
    b.lArm.rotation.x = arm;
    b.rArm.rotation.x = -arm;
    if (b.lFore) b.lFore.rotation.x = fore;
    if (b.rFore) b.rFore.rotation.x = -fore;
    return true;
  }

  function setPose(on) {
    posed = on;
    let ok = false;
    for (const m of allModels) ok = applyPose(m.bones, on) || ok;
    log(on
      ? (ok ? '→ ポーズ補正を適用（LeftArm/RightArm を体側へ回転）' : '→ 腕ボーンが見つからず補正できません')
      : '→ Tポーズ（元データ）に戻しました');
  }

  const loader = new THREE.GLTFLoader();
  function addInstance(offsetX, report) {
    loader.load('assets/models/rein.glb', gltf => {
      const root = gltf.scene;
      // モデルは高さ1.0に正規化されている。腕がZ軸沿いなので正面（+Z）へ向ける
      root.rotation.y = Math.PI / 2;
      root.position.x = offsetX;
      group.add(root);
      const b = collectBones(root);
      allModels.push({ root, bones: b });
      if (allModels.length === 1) bones = b;
      if (posed) applyPose(b, true);
      if (report) {
        let tris = 0, verts = 0, draws = 0, skinned = 0;
        const texSet = new Set();
        root.traverse(o => {
          if (o.isMesh) {
            draws++;
            if (o.isSkinnedMesh) skinned++;
            const g = o.geometry;
            verts += g.attributes.position.count;
            tris += (g.index ? g.index.count : g.attributes.position.count) / 3;
            const mat = o.material;
            if (mat.map) texSet.add(mat.map.uuid);
          }
        });
        const box = new THREE.Box3().setFromObject(root);
        const size = new THREE.Vector3();
        box.getSize(size);
        log('--- three.js 読み込み結果 ---');
        log('メッシュ(ドローコール): ' + draws + '（うちSkinnedMesh: ' + skinned + '）');
        log('三角形: ' + tris.toLocaleString() + ' / 頂点: ' + verts.toLocaleString());
        log('テクスチャ: ' + texSet.size + '枚');
        log('バウンディング(m): x=' + size.x.toFixed(2) + ' y=' + size.y.toFixed(2) + ' z=' + size.z.toFixed(2));
        log('ボーン: ' + (b.lArm ? 'mixamoリグ検出（肩/腕/前腕あり）→ コード補正可能' : '腕ボーンなし'));
        log('ボタンで Tポーズ⇔ポーズ補正 を切り替えて確認してください。');
      }
    }, undefined, err => log('読み込みエラー: ' + err));
  }
  addInstance(0, true);

  document.getElementById('btn-tpose').onclick = () => setPose(false);
  document.getElementById('btn-pose').onclick = () => setPose(true);
  document.getElementById('btn-wire').onclick = () => {
    group.traverse(o => { if (o.isMesh) o.material.wireframe = !o.material.wireframe; });
  };
  let three = false;
  document.getElementById('btn-three').onclick = () => {
    if (three) return;
    three = true;
    addInstance(-0.9, false);
    addInstance(0.9, false);
    log('→ 3体表示（FPSを確認してください）');
  };

  // FPS計測
  const fpsEl = document.getElementById('fps');
  let frames = 0, last = performance.now();
  function tick() {
    requestAnimationFrame(tick);
    group.rotation.y += 0.004; // ターンテーブル
    renderer.render(scene, camera);
    frames++;
    const now = performance.now();
    if (now - last > 1000) {
      fpsEl.textContent = ' FPS: ' + frames;
      frames = 0;
      last = now;
    }
  }
  tick();
})();
</script>
</body>
</html>
