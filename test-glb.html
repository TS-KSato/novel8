<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB技術検証 — rein.glb（ゲーム本体とは無関係の検証専用ページ）</title>
<style>
  body { margin: 0; background: #cfe0f4; font-family: system-ui, sans-serif; }
  #view { width: 100vw; height: 58vh; display: block; touch-action: none; cursor: grab; }
  #view:active { cursor: grabbing; }
  #panel { padding: 10px 14px; }
  button { min-height: 40px; margin: 4px 6px 4px 0; padding: 6px 14px; font-size: 14px; }
  pre { background: #fff; border: 1px solid #ccc; padding: 10px; font-size: 11px;
        overflow: auto; max-height: 34vh; white-space: pre-wrap; }
  .hint { color: #555; font-size: 12px; margin: 2px 0 6px; }
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="panel">
  <div class="hint">ドラッグでカメラ回転（正面・側面・背面から確認できます）。<span id="fps"></span></div>
  <button id="btn-tpose">Tポーズ（元データ）</button>
  <button id="btn-pose">ポーズ補正（腕を下げる）</button>
  <button id="btn-three">3体表示（性能確認）</button>
  <button id="btn-wire">ワイヤーフレーム</button>
  <button id="btn-auto">自動回転 ON/OFF</button>
  <pre id="log"></pre>
</div>
<script src="vendor/three.min.js"></script>
<script src="vendor/GLTFLoader.js"></script>
<script>
(() => {
  'use strict';
  const logEl = document.getElementById('log');
  const log = s => { logEl.textContent += s + '\n'; };
  log('rein.glb 検証ページ（ゲーム本体からはリンクされていません）');

  const canvas = document.getElementById('view');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xcfe0f4);
  const camera = new THREE.PerspectiveCamera(40, 2, 0.05, 50);
  scene.add(new THREE.HemisphereLight(0xf2f7fc, 0xe6d6b8, 1.0));
  const sun = new THREE.DirectionalLight(0xfff2dd, 0.6);
  sun.position.set(3, 5, 4);
  scene.add(sun);
  const ground = new THREE.Mesh(
    new THREE.CylinderGeometry(1.4, 1.4, 0.06, 32),
    new THREE.MeshLambertMaterial({ color: 0x93c161 }));
  ground.position.y = -0.03;
  scene.add(ground);

  // ターンテーブル + ドラッグ操作のカメラ
  let azim = 0.5, elev = 0.35, autoRotate = true;
  function placeCamera() {
    const r = 2.7, cy = 0.55;
    camera.position.set(
      Math.sin(azim) * Math.cos(elev) * r,
      cy + Math.sin(elev) * r,
      Math.cos(azim) * Math.cos(elev) * r);
    camera.lookAt(0, cy, 0);
  }
  function resize() {
    const w = innerWidth, h = innerHeight * 0.58;
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  }
  addEventListener('resize', resize); resize();

  let dragging = false, px = 0, py = 0;
  canvas.addEventListener('pointerdown', e => { dragging = true; autoRotate = false; px = e.clientX; py = e.clientY; });
  addEventListener('pointerup', () => dragging = false);
  addEventListener('pointermove', e => {
    if (!dragging) return;
    azim -= (e.clientX - px) * 0.01;
    elev = Math.max(-0.3, Math.min(1.2, elev + (e.clientY - py) * 0.01));
    px = e.clientX; py = e.clientY;
  });

  const group = new THREE.Group();
  scene.add(group);
  const models = []; // { root, bones:{}, rest:Map }
  let posed = false;

  /* mixamoリグの肩/腕/前腕/手を左右とも収集 */
  function collectBones(root) {
    const b = {};
    root.traverse(o => {
      if (!o.isBone && !o.isObject3D) return;
      const n = (o.name || '').toLowerCase();
      const set = (key, cond) => { if (cond) b[key] = o; };
      set('lArm',  n.endsWith('leftarm'));
      set('rArm',  n.endsWith('rightarm'));
      set('lFore', n.endsWith('leftforearm'));
      set('rFore', n.endsWith('rightforearm'));
      set('lHand', n.endsWith('lefthand'));
      set('rHand', n.endsWith('righthand'));
      set('lSh',   n.endsWith('leftshoulder'));
      set('rSh',   n.endsWith('rightshoulder'));
    });
    return b;
  }

  const wp = o => o.getWorldPosition(new THREE.Vector3());

  /* ボーンの「現在のワールド向き fromDir」を「toDir」へ向ける回転を、
     親のワールド回転を考慮してローカル quaternion に適用する。
     ＝ 表示用の root 回転や左右の鏡像配置に依存しない堅牢な方法。 */
  function alignWorld(bone, fromDir, toDir) {
    const pq = new THREE.Quaternion();
    if (bone.parent) bone.parent.getWorldQuaternion(pq);
    const q = new THREE.Quaternion().setFromUnitVectors(
      fromDir.clone().normalize(), toDir.clone().normalize());
    bone.quaternion.premultiply(pq).premultiply(q).premultiply(pq.clone().invert());
  }

  const OUT = 0.18;          // 体側にわずかに開く量（残し角 ≒ 10°）
  const ELBOW_DEG = 14;      // 前腕の自然な前曲げ

  function poseModel(m) {
    const b = m.bones;
    if (!b.lArm || !b.rArm) return false;
    for (const side of [['l', b.lSh, b.lArm, b.lFore, b.lHand],
                        ['r', b.rSh, b.rArm, b.rFore, b.rHand]]) {
      const [, sh, arm, fore, hand] = side;
      if (!sh || !arm || !hand) continue;
      // 上腕: 現在の腕方向 → 「真下＋わずかに外」へ。左右の符号は方向から自動決定
      const armDir = wp(hand).sub(wp(sh));
      const horiz = new THREE.Vector3(armDir.x, 0, armDir.z).normalize();
      const target = horiz.clone().multiplyScalar(OUT).add(new THREE.Vector3(0, -1, 0));
      alignWorld(arm, armDir, target);
      scene.updateMatrixWorld(true);
      // 前腕: 体側軸まわりに少し前へ曲げる（左右対称）
      if (fore) {
        const faDir = wp(hand).sub(wp(fore));
        const bent = faDir.clone().applyAxisAngle(horiz, THREE.MathUtils.degToRad(ELBOW_DEG));
        alignWorld(fore, faDir, bent);
        scene.updateMatrixWorld(true);
      }
    }
    return true;
  }

  function setPose(on) {
    posed = on;
    let ok = false;
    for (const m of models) {
      m.rest.forEach((q, bone) => bone.quaternion.copy(q)); // 一旦Tポーズへ
      scene.updateMatrixWorld(true);
      if (on) ok = poseModel(m) || ok;
    }
    scene.updateMatrixWorld(true);
    if (!on) { log('→ Tポーズ（元データ）に戻しました'); return; }
    log(ok ? '→ ポーズ補正を適用' : '→ 腕ボーンが見つからず補正できません');
    symmetryReport();
  }

  /* 「両腕が左右対称に下りた」ことの数値ダンプ（目視の裏付け） */
  function symmetryReport() {
    const m = models[0]; if (!m) return;
    const b = m.bones;
    const ls = wp(b.lSh), lh = wp(b.lHand), rs = wp(b.rSh), rh = wp(b.rHand);
    const dyl = lh.y - ls.y, dyr = rh.y - rs.y;
    const hl = Math.hypot(lh.x - ls.x, lh.z - ls.z);
    const hr = Math.hypot(rh.x - rs.x, rh.z - rs.z);
    log('  L 手-肩 dy=' + dyl.toFixed(3) + ' / R dy=' + dyr.toFixed(3)
      + '  両腕とも下向き:' + (dyl < -0.18 && dyr < -0.18));
    log('  dy左右差=' + Math.abs(dyl - dyr).toFixed(3)
      + ' / 水平距離差=' + Math.abs(hl - hr).toFixed(3)
      + '  → 対称:' + (Math.abs(dyl - dyr) < 0.03 && Math.abs(hl - hr) < 0.03));
  }

  const loader = new THREE.GLTFLoader();
  function addInstance(offsetX, report) {
    loader.load('assets/models/rein.glb', gltf => {
      const root = gltf.scene;
      root.rotation.y = Math.PI / 2; // 正面をカメラへ（この回転に依存しないことを実証）
      root.position.x = offsetX;
      group.add(root);
      scene.updateMatrixWorld(true);
      const bones = collectBones(root);
      const rest = new Map();
      root.traverse(o => { if (o.isBone) rest.set(o, o.quaternion.clone()); });
      const m = { root, bones, rest };
      models.push(m);
      if (posed) { poseModel(m); scene.updateMatrixWorld(true); }
      if (report) {
        let tris = 0, verts = 0, draws = 0, skinned = 0; const tex = new Set();
        root.traverse(o => {
          if (!o.isMesh) return;
          draws++; if (o.isSkinnedMesh) skinned++;
          const g = o.geometry;
          verts += g.attributes.position.count;
          tris += (g.index ? g.index.count : g.attributes.position.count) / 3;
          if (o.material.map) tex.add(o.material.map.uuid);
        });
        const size = new THREE.Box3().setFromObject(root).getSize(new THREE.Vector3());
        log('--- three.js 読み込み結果 ---');
        log('ドローコール:' + draws + '（SkinnedMesh:' + skinned + '）');
        log('三角形:' + Math.round(tris).toLocaleString() + ' / 頂点:' + verts.toLocaleString());
        log('テクスチャ:' + tex.size + '枚');
        log('サイズ(m): x=' + size.x.toFixed(2) + ' y=' + size.y.toFixed(2) + ' z=' + size.z.toFixed(2));
        log('腕ボーン: ' + (bones.lArm && bones.rArm ? '左右とも検出 → コード補正可能' : '不足'));
        log('「ポーズ補正」を押すと両腕が下ります。');
      }
    }, undefined, err => log('読み込みエラー: ' + err));
  }
  addInstance(0, true);

  document.getElementById('btn-tpose').onclick = () => setPose(false);
  document.getElementById('btn-pose').onclick = () => setPose(true);
  document.getElementById('btn-wire').onclick = () =>
    group.traverse(o => { if (o.isMesh) o.material.wireframe = !o.material.wireframe; });
  document.getElementById('btn-auto').onclick = () => { autoRotate = !autoRotate; };
  let three = false;
  document.getElementById('btn-three').onclick = () => {
    if (three) return; three = true;
    addInstance(-0.95, false); addInstance(0.95, false);
    log('→ 3体表示（FPSと両腕の対称を確認）');
  };

  const fpsEl = document.getElementById('fps');
  let frames = 0, last = performance.now();
  function tick() {
    requestAnimationFrame(tick);
    if (autoRotate) azim += 0.006;
    placeCamera();
    renderer.render(scene, camera);
    frames++;
    const now = performance.now();
    if (now - last > 1000) { fpsEl.textContent = 'FPS: ' + frames; frames = 0; last = now; }
  }
  tick();
})();
</script>
</body>
</html>
