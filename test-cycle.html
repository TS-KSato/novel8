<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>昼夜サイクル計測（ゲーム本体とは無関係の検証専用）</title>
<style>
  body { margin: 0; background: #cfe0f4; font-family: system-ui, sans-serif; }
  #city-view { position: relative; width: 100vw; height: 56vh; overflow: hidden; }
  #panel { padding: 10px 14px; font-size: 13px; }
  table { border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  td, th { border: 1px solid #bbb; padding: 2px 8px; text-align: right; }
  .big { font-size: 15px; font-weight: bold; }
  .dark { color: #1a6b1a; } .bright { color: #b04040; }
</style>
</head>
<body>
<div id="city-view"></div>
<div id="panel">
  <div class="big" id="summary">計測中…（WebGL初期化を待っています）</div>
  <div>地面（画面手前）の実描画ピクセル輝度を、posを進めながら読み戻して計測します。</div>
  <table id="tbl"><thead><tr><th>pos</th><th>時間帯</th><th>地面輝度(0-255)</th><th>昼(pos85)比</th></tr></thead>
  <tbody></tbody></table>
</div>
<script src="vendor/three.min.js"></script>
<script src="js/town-model.js"></script>
<script src="js/town3js.js"></script>
<script>
(() => {
  'use strict';
  const T = window.LizaTown3D;
  const host = document.getElementById('city-view');
  const ok = T.init(host, {});
  const sum = document.getElementById('summary');
  if (!ok || !T.ready) { sum.textContent = 'WebGL初期化に失敗（この環境では3D不可）。実機ブラウザで開いてください。'; return; }
  T.render({ stage: 3, lv: { lantern: 6, market: 3, school: 2, clinic: 1, lights: 3 }, residents: 22, decor: ['bench','flowerbed'] });

  const phaseOf = p => p < 50 ? 'morning' : p < 120 ? 'day' : p < 170 ? 'dusk' : 'night';
  // 昼の基準
  const dayS = T.__sampleGround(85);
  const dayLum = dayS.lum;
  const tbody = document.querySelector('#tbl tbody');
  function row(pos) {
    const s = T.__sampleGround(pos);
    const ratio = (s.lum / dayLum * 100).toFixed(0);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${pos}</td><td>${phaseOf(pos)}</td><td>${s.lum.toFixed(0)}</td><td class="${ratio<50?'dark':'bright'}">${ratio}%</td>`;
    tbody.appendChild(tr);
    return s.lum;
  }
  const positions = [85, 120, 145, 160, 170, 180, 190, 205, 220, 235, 0, 25];
  const lums = {};
  for (const p of positions) lums[p] = row(p);
  const night = lums[205], day = lums[85];
  sum.innerHTML = `昼(pos85)=${day.toFixed(0)} / 深夜(pos205)=${night.toFixed(0)} → ` +
    `<span class="${night/day<0.5?'dark':'bright'}">夜は昼の ${(night/day*100).toFixed(0)}%</span>` +
    `（50%未満で「夜が暗い」と判定）`;

  // 参考: 実際の進行（main.jsと同じ NIGHT_START=170 から +1/秒で進む）
  // pos205(深夜)到達まで 35秒、1周 240秒。
})();
</script>
</body>
</html>
