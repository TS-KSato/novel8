<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b1026">
<title>灯火の街リーザ</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/town3d.css">
</head>
<body>
<div id="app">

  <!-- 街ビュー -->
  <header id="city-view" class="stage-1 t-night" aria-label="街ビュー（タップで光を獲得）">
    <div id="stars"></div>
    <div id="moon"></div>
    <div id="sky-tints">
      <div class="tint tint-morning"></div>
      <div class="tint tint-day"></div>
      <div class="tint tint-dusk"></div>
    </div>
    <div id="clouds">
      <span class="cloud c1"></span>
      <span class="cloud c2"></span>
      <span class="cloud c3"></span>
    </div>
    <div class="layer" id="layer-far"></div>
    <div class="layer" id="layer-mid"></div>
    <div class="layer" id="layer-near"></div>
    <div class="layer" id="layer-fac"></div>
    <div id="ground"></div>
    <div id="resident-lights"></div>
    <div id="ambient-lights"></div>
    <div id="market-glow"></div>
    <div id="diorama"></div>
    <div id="wave"></div>
    <div id="wish-layer"></div>
    <div id="tap-layer"></div>
    <button type="button" id="quest-board-btn" aria-label="街のおねがい">
      <span id="quest-board-icon"></span>
      <span id="quest-badge" hidden>0</span>
    </button>
    <div id="stage-banner">
      <span id="stage-no">段階 1</span>
      <span id="stage-name">泥のアジト</span>
      <span id="stage-glow">輝き 0／5</span>
    </div>
    <div id="tap-hint">街をタップして光を集めよう</div>
  </header>

  <!-- 資源表示バー -->
  <section id="resource-bar" aria-label="資源表示">
    <div id="res-grid">
      <div class="res">
        <span class="res-label">✦ 光</span>
        <span class="res-value" id="res-maso">0</span>
        <span class="res-rate" id="rate-maso">+0/秒</span>
      </div>
      <div class="res">
        <span class="res-label">▤ 木材</span>
        <span class="res-value" id="res-shizai">0</span>
        <span class="res-rate" id="rate-shizai">+0/秒</span>
      </div>
      <div class="res">
        <span class="res-label">🏠 住人</span>
        <span class="res-value" id="res-people">0</span>
        <span class="res-rate">この街の仲間</span>
      </div>
    </div>
    <div id="goal-chip" aria-label="次の目標">
      <span id="goal-lamp"></span>
      <span id="goal-text"></span>
    </div>
  </section>

  <!-- 施設リスト -->
  <main id="facility-area">
    <h2 id="facility-heading">施設</h2>
    <ul id="facility-list"></ul>
  </main>

  <!-- フッターメニュー -->
  <nav id="footer-menu" aria-label="メニュー">
    <button type="button" class="tab active" data-tab="city">
      <span class="tab-icon icon-home" aria-hidden="true"></span><span class="tab-label">街</span>
    </button>
    <button type="button" class="tab" data-tab="facility">
      <span class="tab-icon icon-build" aria-hidden="true"></span><span class="tab-label">施設</span>
    </button>
    <button type="button" class="tab" data-tab="records">
      <span class="tab-icon icon-book" aria-hidden="true"></span><span class="tab-label">図鑑</span>
    </button>
    <button type="button" class="tab" data-tab="settings">
      <span class="tab-icon icon-gear" aria-hidden="true"></span><span class="tab-label">設定</span>
    </button>
  </nav>

</div>

<!-- 仲間の声・お知らせトースト -->
<div id="toast-area" aria-live="polite"></div>

<!-- 段階アップの祝祭演出 -->
<div id="celebration" hidden></div>

<!-- オープニング「約束」 -->
<div id="opening" class="scene-1" hidden>
  <button type="button" id="op-skip">スキップ</button>
  <div id="op-stage">
    <div id="op-friends">
      <span class="op-friend f1"></span>
      <span class="op-friend f2"></span>
      <span class="op-friend f3"></span>
      <span class="op-friend f4"></span>
    </div>
    <div id="op-lantern"></div>
  </div>
  <p id="op-text"></p>
  <p id="op-next-hint">タップで進む</p>
  <button type="button" id="op-start" hidden>始める</button>
  <div id="op-flash"></div>
</div>

<!-- モーダル -->
<div id="modal-overlay" hidden>
  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-lamp"></div>
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <button type="button" id="modal-close">閉じる</button>
  </div>
</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/GLTFLoader.js"></script>
<script src="js/town-model.js"></script>
<script src="js/town3js.js"></script>
<script src="js/town3d.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
